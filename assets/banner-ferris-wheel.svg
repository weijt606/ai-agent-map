<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Map stylized signpost banner</title>
  <desc id="desc">An original illustration of a cool traveler at a crossroads facing a stylized multi-angle signpost of AI agents, with branching roads labeled by common agent routes.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8ccd9" />
      <stop offset="62%" stop-color="#d9e6eb" />
      <stop offset="100%" stop-color="#f2f5f1" />
    </linearGradient>
    <linearGradient id="cityScape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bacace" />
      <stop offset="100%" stop-color="#d9e3df" />
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff0c9" />
      <stop offset="100%" stop-color="#bdd99a" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.97" />
      <stop offset="100%" stop-color="#f5fbff" stop-opacity="0.93" />
    </linearGradient>
    <linearGradient id="pole" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132735" />
      <stop offset="28%" stop-color="#355366" />
      <stop offset="52%" stop-color="#8de8ff" />
      <stop offset="74%" stop-color="#2a475a" />
      <stop offset="100%" stop-color="#10222f" />
    </linearGradient>
    <linearGradient id="poleCircuit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b7f5ff" stop-opacity="0.96" />
      <stop offset="100%" stop-color="#52d3ff" stop-opacity="0.18" />
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9feff" stop-opacity="1" />
      <stop offset="45%" stop-color="#7de8ff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#7de8ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="woodHoney" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4c287" />
      <stop offset="100%" stop-color="#bb8a47" />
    </linearGradient>
    <linearGradient id="woodRose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cf9f95" />
      <stop offset="100%" stop-color="#9c6a62" />
    </linearGradient>
    <linearGradient id="woodSky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b9d1e8" />
      <stop offset="100%" stop-color="#84a5c4" />
    </linearGradient>
    <linearGradient id="woodOlive" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8c99d" />
      <stop offset="100%" stop-color="#7f9668" />
    </linearGradient>
    <linearGradient id="woodCream" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3dfab" />
      <stop offset="100%" stop-color="#c4a56b" />
    </linearGradient>
    <linearGradient id="woodPlum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0c0de" />
      <stop offset="100%" stop-color="#9a84ab" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#385867" flood-opacity="0.16" />
    </filter>
    <style>
      .title { font: 700 40px ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #163f58; }
      .subtitle { font: 500 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #335c73; }
      .plankLight { font: 700 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #f8f1e5; letter-spacing: 0.3px; }
      .plankDark { font: 700 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #183a4a; letter-spacing: 0.2px; }
      .marker { font: 700 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f4559; }
    </style>
